<div class="grid grid-cols-1 lg:grid-cols-12 gap-4 h-screen p-4 mb-4">
    <!-- Panel Izquierdo - Lista de Usuarios -->
    <div class="lg:col-span-4 flex flex-col">
        <p-card styleClass="h-full">
            <ng-template pTemplate="header">
                <div class="flex justify-between items-center p-4">
                    <div>
                        <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0">Lista de Usuarios</h2>
                        <p class="text-surface-600 dark:text-surface-400 text-sm">Gestiona los usuarios de la empresa</p>
                    </div>
                </div>
            </ng-template>

            <!-- Toolbar -->
            <p-toolbar styleClass="mb-4">
                <ng-template pTemplate="right">
                    <p-iconField iconPosition="left">
                        <p-inputIcon>
                            <i class="pi pi-search"></i>
                        </p-inputIcon>
                        <input
                            pInputText
                            type="text"
                            placeholder="Buscar usuarios..."
                            (input)="onSearch($event)"
                            class="w-full">
                    </p-iconField>
                </ng-template>
            </p-toolbar>

            <!-- Lista de Usuarios -->
            <div class="flex-1 overflow-auto">

                <!-- Loading Skeleton -->
                <div *ngIf="loading" class="space-y-3">
                    <div *ngFor="let item of [1,2,3,4,5]" class="border rounded-lg p-4">
                        <div class="flex items-center space-x-4">
                            <p-skeleton shape="circle" size="3rem"></p-skeleton>
                            <div class="flex-1">
                                <p-skeleton height="1rem" class="mb-2"></p-skeleton>
                                <p-skeleton height="0.8rem" width="70%"></p-skeleton>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Lista Real de Usuarios -->
                <div *ngIf="!loading" class="space-y-2">
                    <div
                        *ngFor="let user of paginatedUsers"
                        class="border rounded-lg p-4 hover:bg-surface-50 dark:hover:bg-surface-800 transition-colors cursor-pointer"
                        (click)="selectUser(user)">

                        <div class="flex items-center space-x-4">
                            <!-- Avatar -->
                            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-primary-100 dark:bg-primary-900/30">
                                <i class="pi pi-user text-primary text-xl"></i>
                            </div>

                            <!-- Info del Usuario -->
                            <div class="flex-1 min-w-0">
                                <h3 class="font-semibold text-surface-900 dark:text-surface-0 truncate">
                                    {{ user.usunombre }}
                                </h3>
                                <p class="text-sm text-surface-600 dark:text-surface-400 truncate">
                                    {{ user.usucod }} • {{ user.usucodv }}
                                </p>
                                <div class="flex items-center space-x-2 mt-1">
                                    <!-- Estado -->
                                    <p-tag
                                        [value]="getEstadoText(user.usuestado)"
                                        [severity]="getEstadoSeverity(user.usuestado)"
                                        styleClass="text-xs">
                                    </p-tag>

                                    <!-- Accesos -->
                                    <div class="flex space-x-1">
                                        <i *ngIf="user.usuwebapp" class="pi pi-desktop text-green-500 text-xs" title="Acceso Web"></i>
                                        <i *ngIf="user.usuapp" class="pi pi-mobile text-blue-500 text-xs" title="Acceso Móvil"></i>
                                        <i *ngIf="user.usugeol" class="pi pi-map-marker text-orange-500 text-xs" title="Geolocalización"></i>
                                    </div>
                                </div>
                            </div>

                            <!-- Flecha -->
                            <i class="pi pi-chevron-right text-surface-400"></i>
                        </div>
                    </div>

                    <!-- Mensaje si no hay usuarios -->
                    <div *ngIf="filteredUsers.length === 0" class="text-center py-8">
                        <i class="pi pi-users text-4xl text-surface-400 mb-4"></i>
                        <p class="text-surface-600 dark:text-surface-400">No se encontraron usuarios</p>
                    </div>
                </div>
            </div>

            <!-- Paginación -->
            <ng-template pTemplate="footer">
                <p-paginator
                    *ngIf="!loading && filteredUsers.length > 0"
                    [rows]="itemsPerPage"
                    [totalRecords]="filteredUsers.length"
                    [first]="first"
                    (onPageChange)="onPageChange($event)"
                    [rowsPerPageOptions]="[5, 10, 20]">
                </p-paginator>
            </ng-template>

        </p-card>
    </div>

    <!-- Panel Derecho - Mapa -->
    <div class="lg:col-span-8">
        <p-card styleClass="h-full">
            <ng-template pTemplate="header">
                <div class="flex justify-between items-center p-4">
                    <div>
                        <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0">Ubicaciones</h2>
                        <p class="text-surface-600 dark:text-surface-400 text-sm">Mapa de geolocalización de usuarios</p>
                    </div>
                </div>
            </ng-template>

            <!-- Contenedor del Mapa -->
            <div class="h-full min-h-[500px] relative">
                <!-- Loading del mapa -->
                <div *ngIf="!map" class="absolute inset-0 flex items-center justify-center bg-surface-100 dark:bg-surface-800 rounded-lg z-10">
                    <div class="text-center">
                        <i class="pi pi-spin pi-spinner text-2xl text-primary mb-2"></i>
                        <p class="text-surface-600 dark:text-surface-400">Cargando mapa...</p>
                    </div>
                </div>

                <!-- Mapa de Leaflet -->
                <div #mapContainer
                     class="w-full h-full rounded-lg"
                     style="min-height: 500px; height: 100%; width: 100%;">
                </div>
            </div>

        </p-card>
    </div>
</div>

<!-- Dialog para Nuevo Usu  -->
<p-dialog
    [(visible)]="userDialog"
    [style]="{ width: '450px' }"
    header="Detalles del Usuario"
    [modal]="true"
    class="p-fluid">

    <!-- Contenido del formulario aquí -->
    <ng-template pTemplate="content">
        <div class="text-center py-8">
            <i class="pi pi-cog text-4xl text-surface-400 mb-4"></i>
            <p class="text-surface-600 dark:text-surface-400">Formulario de usuario en construcción</p>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <p-button
            label="Cancelar"
            icon="pi pi-times"
            text
            (click)="hideDialog()">
        </p-button>
    </ng-template>
</p-dialog>
